# Local macOS development. Activate with SPRING_PROFILES_ACTIVE=local.
spring:
  datasource:
    url: ${LOCAL_POSTGRES_URL:jdbc:postgresql://localhost:5432/voiceassistant}
    username: ${LOCAL_POSTGRES_USER:voiceassistant}
    password: ${LOCAL_POSTGRES_PASSWORD:voiceassistant}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

transcription:
  whisper:
    base-url: ${WHISPER_BASE_URL:http://localhost:9000}

google:
  calendar:
    tokens-directory: ${GOOGLE_TOKENS_DIRECTORY:${user.home}/.voice-assistant/tokens}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
