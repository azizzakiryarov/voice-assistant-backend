# Database configuration
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/voiceassistant
    username: ${POSTGRES_USER:azizzakiryarov}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CALENDAR_CLIENT_ID}
            client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/calendar
              - https://www.googleapis.com/auth/tasks

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# OpenAI
  ai:
    ollama:
      base-url: http://ollama-svc:11434
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2:1b}
          temperature: ${OLLAMA_TEMPERATURE:0.3}
          keep-alive: ${OLLAMA_KEEP_ALIVE:30m}
          num-ctx: ${OLLAMA_NUM_CTX:4096}
          num-thread: ${OLLAMA_NUM_THREAD:4}
          num-predict: ${OLLAMA_NUM_PREDICT:2600}
transcription:
  whisper:
    base-url: ${WHISPER_BASE_URL:http://localhost:9000}

  # Server
server:
  port: 8081
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

google:
  calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET}
    application-name: voice-assistent-client
    tokens-directory: /app/tokens

app:
  frontend-url: ${APP_FRONTEND_URL:/}
  text-analysis:
    ollama:
      keep-alive: ${TEXT_ANALYSIS_OLLAMA_KEEP_ALIVE:${OLLAMA_KEEP_ALIVE:30m}}
      num-ctx: ${TEXT_ANALYSIS_OLLAMA_NUM_CTX:${OLLAMA_NUM_CTX:4096}}
      num-thread: ${TEXT_ANALYSIS_OLLAMA_NUM_THREAD:${OLLAMA_NUM_THREAD:4}}
      num-predict: ${TEXT_ANALYSIS_OLLAMA_NUM_PREDICT:${OLLAMA_NUM_PREDICT:2600}}
  form-scan:
    max-bytes: ${FORM_SCAN_MAX_BYTES:10485760}
    vision:
      base-url: ${FORM_SCAN_VISION_BASE_URL:http://ollama-svc:11434}
      model: ${FORM_SCAN_VISION_MODEL:moondream}

# CORS
web:
  cors:
    allowed-origins: '*'
    allowed-methods: 'GET,POST,PUT,DELETE,OPTIONS'
    allowed-headers: 'Authorization,Content-Type,X-Requested-With'
