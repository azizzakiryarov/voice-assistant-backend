# Database configuration
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/voiceassistant
    username: ${POSTGRES_USER:azizzakiryarov}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CALENDAR_CLIENT_ID}
            client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/calendar

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# OpenAI
  ai:
    ollama:
      base-url: http://ollama-svc:11434
      chat:
        options:
          model: llama3.2:1b
          temperature: 0.3
transcription:
  whisper:
    base-url: ${WHISPER_BASE_URL:http://localhost:9000}

  # Server
server:
  port: 8081

google:
  calendar:
    client-id: ${GOOGLE_CALENDAR_CLIENT_ID}
    client-secret: ${GOOGLE_CALENDAR_CLIENT_SECRET}
    application-name: voice-assistent-client
    tokens-directory: /app/tokens

app:
  frontend-url: ${APP_FRONTEND_URL:/}

# CORS
web:
  cors:
    allowed-origins: '*'
    allowed-methods: 'GET,POST,PUT,DELETE,OPTIONS'
    allowed-headers: 'Authorization,Content-Type,X-Requested-With'
